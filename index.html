<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>お弁当ダッシュボード</title>
  <script src="https://accounts.google.com/gsi/client?hl=ja" async defer></script>
  <style>
#auth-gate {
  position:fixed; inset:0; z-index:9999;
  background:rgba(26,82,118,0.92);
  backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
}
.auth-box {
  background:#fff; border-radius:12px;
  padding:32px 28px; text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  max-width:380px; width:90%;
}
.auth-box .auth-title {
  margin-bottom:8px; font-size:1.05rem; color:#1a5276;
  font-weight:bold;
}
.auth-box .auth-desc {
  margin-bottom:20px; font-size:.88rem; color:#555;
  line-height:1.65;
}
.auth-box .auth-desc strong { color:#1a5276; }
.gsi-wrap { display:flex; justify-content:center; min-height:44px; }
#auth-error {
  color:#e74c3c; font-size:.85rem; margin-top:14px;
  display:none; line-height:1.55;
}
</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
      background: #f8f9fa;
      color: #333;
      padding: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 24px 16px;
      background: #1a5276;
      color: #fff;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    header h1 { font-size: 1.6rem; margin-bottom: 12px; }
    .date-selector {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      padding: 8px 16px;
      border-radius: 6px;
    }
    .date-selector label {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .date-selector select {
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      font-family: inherit;
      cursor: pointer;
    }
    .update-time {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 8px;
    }
    .kpi-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 5px solid #2980b9;
    }
    .kpi-card.kpi-blue { border-left-color: #2980b9; }
    .kpi-card.kpi-green { border-left-color: #27ae60; }
    .kpi-card.kpi-orange { border-left-color: #e67e22; }
    .kpi-value { font-size: 2rem; font-weight: 700; color: #1a5276; }
    .kpi-label { font-size: 0.85rem; color: #666; margin-top: 4px; }
    .chart-section, .table-section {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .chart-section h2, .table-section h2 {
      font-size: 1.1rem;
      color: #1a5276;
      margin-bottom: 12px;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .table-header h2 { margin-bottom: 0; }
    .csv-download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      color: #1a5276;
      transition: background 0.2s, border-color 0.2s;
    }
    .csv-download-btn:hover {
      background: #e8f4f8;
      border-color: #2980b9;
    }
    .chart-container { width: 100%; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td { padding: 10px 12px; text-align: left; }
    th { background: #1a5276; color: #fff; font-weight: 600; }
    td.num { text-align: right; }
    tbody tr:nth-child(even) { background: #f2f2f2; }
    tbody tr:hover { background: #e8f4f8; }
    .total-row { font-weight: 700; background: #d6eaf8 !important; }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.8rem;
      color: #888;
    }
    @media (max-width: 768px) {
      body { padding: 8px; }
      header h1 { font-size: 1.2rem; }
      .kpi-value { font-size: 1.5rem; }
      .chart-section, .table-section { padding: 12px; }
      table { font-size: 0.8rem; }
      th, td { padding: 6px 8px; }
      .date-selector { padding: 6px 10px; }
      .date-selector select { font-size: 0.9rem; }
    }

  </style>
</head>

  <script>
  (function(){
    var ALLOWED_DOMAIN='jsdallas.org';
    var ALLOWED_EMAILS=["kinomata@jsdallas.org", "ywilloughby@jsdallas.org", "1901f@jsdallas.org", "ff4468@jsdallas.org", "ef4737@jsdallas.org", "2735h@jsdallas.org", "sh5221@jsdallas.org", "mh5327@jsdallas.org", "2473n@jsdallas.org", "an4942@jsdallas.org", "2617m@jsdallas.org", "lm5116@jsdallas.org", "2270m@jsdallas.org", "tm5151@jsdallas.org", "sm4808@jsdallas.org", "2726t@jsdallas.org", "mt5245@jsdallas.org"];
    var ENCRYPTED = true;
    
  var KEY_B64 = "Xg5l/KY4jyt5SRBQw0nsHqMgJM+Jy5qMELkrBrsEAF4=";
  var AUTH_KEY = "gae_auth";
  var AUTH_TTL_MS = 3300000;
  function b64ToBytes(b64) {
    var bin = atob(b64);
    var out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  var _cryptoKey = null;
  async function _getKey() {
    if (_cryptoKey) return _cryptoKey;
    _cryptoKey = await crypto.subtle.importKey(
      'raw', b64ToBytes(KEY_B64), 'AES-GCM', false, ['decrypt']);
    return _cryptoKey;
  }
  async function decryptBytesRaw(iv, ct) {
    var key = await _getKey();
    return await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64ToBytes(iv) }, key, b64ToBytes(ct));
  }
  async function decryptBlock(encId) {
    var el = document.getElementById(encId);
    if (!el) return null;
    var payload = JSON.parse(el.textContent);
    var pt = await decryptBytesRaw(payload.iv, payload.ct);
    return new TextDecoder().decode(pt);
  }
  async function decryptBlockBytes(encId) {
    var el = document.getElementById(encId);
    if (!el) return null;
    var payload = JSON.parse(el.textContent);
    var pt = await decryptBytesRaw(payload.iv, payload.ct);
    return new Uint8Array(pt);
  }
  function cacheAuth(email) {
    try {
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        email: email, expiresAt: Date.now() + AUTH_TTL_MS
      }));
    } catch (e) {}
  }
  function authCached() {
    try {
      var v = JSON.parse(localStorage.getItem(AUTH_KEY) || 'null');
      return v && v.expiresAt > Date.now() ? v : null;
    } catch (e) { return null; }
  }
  function clearAuthCache() {
    try { localStorage.removeItem(AUTH_KEY); } catch (e) {}
  }

    function hideGate() {
      var gate=document.getElementById('auth-gate');
      if (gate) gate.style.display='none';
    }
    function isEmailAllowed(email) {
      if (ALLOWED_EMAILS.length === 0) return true;
      return ALLOWED_EMAILS.indexOf(email.toLowerCase()) !== -1;
    }
    async function renderAfterAuth(email) {
      hideGate();
      try { cacheAuth(email || 'cached'); } catch (e) {}
      if (ENCRYPTED) {
        try {
          var mainEl = document.querySelector('main');
          var inner = await decryptBlock('enc-main');
          if (mainEl && inner != null) {
            mainEl.innerHTML = inner;
            // innerHTML で挿入された <script> はブラウザが実行しないため手動で再実行
            var scripts = mainEl.querySelectorAll('script');
            for (var i = 0; i < scripts.length; i++) {
              var newScript = document.createElement('script');
              if (scripts[i].src) {
                newScript.src = scripts[i].src;
              } else {
                newScript.textContent = scripts[i].textContent;
              }
              scripts[i].parentNode.replaceChild(newScript, scripts[i]);
            }
          }
        } catch (e) {
          var err = document.getElementById('auth-error');
          if (err) {
            err.textContent = 'コンテンツの復号に失敗しました。';
            err.style.display='block';
          }
        }
      }
      if (window.location.hash) {
        requestAnimationFrame(function() {
          var target = document.querySelector(window.location.hash);
          if (target) target.scrollIntoView();
        });
      }
    }
    function parseJwt(token){
      var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      var json=decodeURIComponent(atob(base64).split('').map(function(c){
        return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(json);
    }
    window.handleCredentialResponse=function(response){
      var err=document.getElementById('auth-error');
      try{
        var payload=parseJwt(response.credential);
        var email=payload.email||'';
        var hd=payload.hd||(email.split('@')[1]||'');
        var verified=payload.email_verified===true||payload.email_verified==='true';
        if(hd===ALLOWED_DOMAIN&&verified){
          if(!isEmailAllowed(email)){
            err.textContent='アクセスが拒否されました。'+email+' はこのダッシュボードへのアクセス権がありません。管理者にお問い合わせください。';
            err.style.display='block';
            clearAuthCache();
            if(window.google&&window.google.accounts&&window.google.accounts.id){
              window.google.accounts.id.disableAutoSelect();
            }
            return;
          }
          renderAfterAuth(email);
        }else{
          err.textContent='アクセスが拒否されました。'+(email||'このアカウント')+' は '+ALLOWED_DOMAIN+' のアカウントではありません。';
          err.style.display='block';
          if(window.google&&window.google.accounts&&window.google.accounts.id){
            window.google.accounts.id.disableAutoSelect();
          }
        }
      }catch(e){
        err.textContent='サインインを確認できませんでした。';
        err.style.display='block';
      }
    };
    document.addEventListener('DOMContentLoaded', function() {
      var cached = authCached();
      if (cached) {
        if (!isEmailAllowed(cached.email)) {
          clearAuthCache();
          return;
        }
        renderAfterAuth(cached.email);
      }
    });
  })();
  </script>
</body>
</html>
